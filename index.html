<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Marketplace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Marketplace</span>
            <button class="btn btn-light btn-sm" id="btn-show-add" onclick="showScreen('add-product')">+ Sell Product</button>
        </div>
    </nav>

    <div id="screen-list" class="container">
        <h2 class="h4 mb-3">Recent Products</h2>
        <div class="row g-3" id="product-container">
            <div class="col-12 text-center p-5">
                <div class="spinner-border text-primary" role="status"></div>
            </div>
        </div>
    </div>

    <div id="screen-add" class="container d-none">
        <div class="d-flex align-items-center mb-3">
            <button class="btn btn-link p-0 me-2" onclick="showScreen('list')">← Back</button>
            <h2 class="h4 mb-0">List New Product</h2>
        </div>
        
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <form id="product-form">
                    <div class="mb-3">
                        <label class="form-label">Product Name</label>
                        <input type="text" id="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea id="desc" class="form-control" rows="3" required></textarea>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Price (฿)</label>
                            <input type="number" id="price" class="form-control" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Contact</label>
                            <input type="text" id="contact" class="form-control" placeholder="Line/Tel" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Product Image</label>
                        <input type="file" id="image" class="form-control" accept="image/*" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2" id="submit-btn">Post Product</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
